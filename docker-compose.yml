version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - USE_LOCAL_BROWSER=true
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    restart: always
